<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Land - Rope Access & Rescue Training</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Kantumruy+Pro:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --gold: #d4af37; --deep-black: #050505; }
        
        /* Font Cambodia */
        [lang="km"] { font-family: 'Kantumruy Pro', 'Montserrat', sans-serif; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--deep-black); color: white; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .bg-iron {
            background-image: linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.9)), 
                              url('https://images.unsplash.com/photo-1516139008210-96e45dccd83b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        .gold-text { color: var(--gold); }
        .gold-border { border-color: var(--gold); }
        .gold-bg { background-color: var(--gold); }
        
        .reveal-brand-box { animation: revealBox 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .reveal-slogan { animation: revealSlogan 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards; opacity: 0; }
        .reveal-content { animation: fadeIn 1.2s ease-out 1.2s forwards; opacity: 0; }

        @keyframes revealBox { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes revealSlogan { from { opacity: 0; letter-spacing: 0.1em; transform: translateY(10px); } to { opacity: 1; letter-spacing: 0.5em; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s ease; }
        .glass-card:hover { border-color: rgba(212, 175, 55, 0.5); transform: translateY(-5px); }

        .lang-btn.active { background-color: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        #contactModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        #contactModal.active { display: flex; animation: fadeIn 0.3s ease; }
        
        .form-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; width: 100%; padding: 1rem; border-radius: 0.75rem; font-size: 0.875rem; }
        .form-input:focus { border-color: var(--gold); outline: none; background: rgba(255, 255, 255, 0.1); }
        
        select.form-input option { background-color: #1a1a1a; color: white; }
    </style>
</head>
<body id="body-tag">

    <div class="bg-iron"></div>

    <header class="p-6 md:p-10 flex flex-col sm:flex-row justify-between sm:justify-end items-center gap-6 max-w-7xl mx-auto w-full reveal-content">
        <div class="flex items-center space-x-4">
            <a href="https://www.facebook.com/profile.php?id=61584757420201" target="_blank" class="p-3 bg-white/5 rounded-full hover:gold-bg transition-all border border-white/5 group">
                <img src="FB.png" alt="FB" class="w-5 h-5 object-contain group-hover:brightness-0">
            </a>
            <a href="https://www.tiktok.com/@iron.land.vraa" target="_blank" class="p-3 bg-white/5 rounded-full hover:gold-bg transition-all border border-white/5 group">
                <img src="TIK.png" alt="TIK" class="w-5 h-5 object-contain group-hover:brightness-0">
            </a>
        </div>
        <div class="flex items-center space-x-1 bg-white/5 p-1 rounded-full border border-white/10">
            <button onclick="setLanguage('vi')" id="btn-vi" class="lang-btn active px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">VI</button>
            <button onclick="setLanguage('en')" id="btn-en" class="lang-btn px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">EN</button>
            <button onclick="setLanguage('km')" id="btn-km" class="lang-btn px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest">KH</button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center px-6 text-center">
        <div class="space-y-6 md:space-y-8 max-w-5xl">
            <div class="reveal-brand-box inline-block border-[3px] md:border-[6px] gold-border px-8 py-3 md:px-16 md:py-6">
                <h1 class="text-4xl md:text-8xl font-black uppercase tracking-[0.1em] gold-text">IRON LAND</h1>
            </div>
            <div class="reveal-slogan">
                <p id="slogan" class="text-sm md:text-2xl text-white font-light uppercase italic">Built Unbreakable</p>
            </div>
            <div class="reveal-content w-16 h-0.5 gold-bg mx-auto my-6"></div>
            <div class="reveal-content max-w-2xl mx-auto">
                <p id="description" class="text-sm md:text-lg text-gray-300 font-light leading-relaxed">
                    Website đang được nâng cấp. Iron Land sẽ sớm trở lại với các khóa đào tạo Tiếp cận dây và Cứu hộ tiêu chuẩn quốc tế.
                </p>
            </div>
            <div class="reveal-content inline-flex items-center space-x-3 bg-white/5 px-5 py-2 rounded-full border border-white/10">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute h-full w-full rounded-full gold-bg opacity-75"></span><span class="relative rounded-full h-2 w-2 gold-bg"></span></span>
                <span id="status-text" class="text-[10px] font-semibold uppercase tracking-[0.3em] text-gray-400">Đang nâng cấp hệ thống</span>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mt-16 w-full max-w-7xl reveal-content">
            <div class="glass-card p-6 md:p-8 rounded-xl flex flex-col items-center">
                <i data-lucide="map-pin" class="gold-text w-6 h-6 mb-4"></i>
                <h3 id="label-address" class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2 font-bold">Cơ sở đào tạo</h3>
                <p class="text-xs md:text-sm text-gray-200" id="val-address">45 Nguyễn Thị Dòn, Nhuận Đức, Củ Chi, TP. HCM</p>
            </div>
            <div class="glass-card p-6 md:p-8 rounded-xl flex flex-col items-center">
                <i data-lucide="phone-call" class="gold-text w-6 h-6 mb-4"></i>
                <h3 id="label-hotline" class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2 font-bold">Hotline</h3>
                <p class="text-lg md:text-xl font-extrabold gold-text
