    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --gold: #d4af37; --deep-black: #050505; }
        
        /* Hỗ trợ font chữ Cambodia (Kantumruy Pro) khi chuyển vùng */
        [lang="km"] { font-family: 'Kantumruy Pro', sans-serif; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--deep-black); color: white; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        
        .bg-iron {
            background-image: linear-gradient(rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.9)), 
                              url('https://images.unsplash.com/photo-1516139008210-96e45dccd83b?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        .gold-text { color: var(--gold); }
        .gold-border { border-color: var(--gold); }
        .gold-bg { background-color: var(--gold); }
        
        .reveal-brand-box { animation: revealBox 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .reveal-slogan { animation: revealSlogan 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s forwards; opacity: 0; }
        .reveal-content { animation: fadeIn 1.2s ease-out 1.2s forwards; opacity: 0; }

        @keyframes revealBox { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes revealSlogan { from { opacity: 0; letter-spacing: 0.1em; transform: translateY(10px); } to { opacity: 1; letter-spacing: 0.5em; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.4s ease; }
        .glass-card:hover { border-color: rgba(212, 175, 55, 0.5); transform: translateY(-5px); }

        .lang-btn.active { background-color: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        #contactModal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        #contactModal.active { display: flex; animation: fadeIn 0.3s ease; }
        
        .form-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; width: 100%; padding: 1rem; border-radius: 0.75rem; font-size: 0.875rem; }
        .form-input:focus { border-color: var(--gold); outline: none; background: rgba(255, 255, 255, 0.1); }
        
        /* Style cho Dropdown mượt mà hơn */
        select.form-input option { background-color: #1a1a1a; color: white; }
    </style>
</head>

            <button onclick="toggleModal()" class="absolute top-6 right-6 text-gray-500 hover:text-white"><i data-lucide="x" class="w-7 h-7"></i></button>
            <h2 id="modal-title" class="text-2xl font-black gold-text mb-2 uppercase text-center"></h2>

    <script>

                btnSend: "បញ្ជូនព័ត៌មាន",
                success: "ជោគជ័យ! យើងនឹងទាក់ទងទៅអ្នកវិញក្នុងពេលឆាប់ៗ។"
            }
        };

        function setLanguage(lang) {
            const t = translations[lang];
            document.getElementById('body-tag').setAttribute('lang', lang);
            document.getElementById('description').innerText = t.desc;
            document.getElementById('status-text').innerText = t.status;
            document.getElementById('label-address').innerText = t.addr;
            document.getElementById('val-address').innerText = t.addrVal;
            document.getElementById('label-hotline').innerText = t.hotline;
            document.getElementById('label-email').innerText = t.email;
            document.getElementById('label-legal').innerText = t.legal;
            document.getElementById('btn-cta').innerText = t.cta;
            document.getElementById('modal-title').innerText = t.mTitle;
            document.getElementById('modal-subtitle').innerText = t.mSub;
            document.getElementById('form-name').placeholder = t.pName;
            document.getElementById('form-phone').placeholder = t.pPhone;
            document.getElementById('submit-btn').innerText = t.btnSend;

            // Update Dropdown Services
            const select = document.getElementById('form-service');
            select.innerHTML = '';
            t.services.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.innerText = s;
                select.appendChild(opt);
            });

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            localStorage.setItem('ironland_lang_pref', lang);
            lucide.createIcons(); // Re-render icons if needed
        }

        function toggleModal() {
            const m = document.getElementById('contactModal');
            m.classList.toggle('active');
            document.body.style.overflow = m.classList.contains('active') ? 'hidden' : '';
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const lang = localStorage.getItem('ironland_lang_pref') || 'vi';
            const name = document.getElementById('form-name').value;
            const phone = document.getElementById('form-phone').value;
            const service = document.getElementById('form-service').value;
            const btn = document.getElementById('submit-btn');

            const message = `🔔 *YÊU CẦU TỪ WEB (${lang.toUpperCase()})*\n━━━━━━━━━━\n👤 Khách: ${name}\n📞 SĐT: ${phone}\n🛠 Dịch vụ: ${service}`;

            btn.innerText = "...";
            btn.disabled = true;

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'Markdown' })
                });
                alert(translations[lang].success);
                toggleModal();
                e.target.reset();
            } catch (err) {
                alert("Error! Please call Hotline.");
            } finally {
                btn.innerText = translations[lang].btnSend;
                btn.disabled = false;
